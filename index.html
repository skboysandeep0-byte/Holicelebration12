<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi | AMRIT OM</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  overflow:hidden;
  height:100vh;
  background:linear-gradient(-45deg,#ff0080,#ff8c00,#00ffff,#8a2be2);
  background-size:400% 400%;
  animation:bgMove 10s ease infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* Floating Glow Particles */
.glow{
  position:absolute;
  width:200px;
  height:200px;
  border-radius:50%;
  filter:blur(100px);
  opacity:0.6;
  animation:float 6s infinite alternate ease-in-out;
}

.glow1{background:#ff0080; top:10%; left:15%;}
.glow2{background:#00ffff; bottom:10%; right:15%; animation-delay:2s;}
.glow3{background:#ffff00; top:60%; left:40%; animation-delay:4s;}

@keyframes float{
  from{transform:translateY(-30px) scale(1);}
  to{transform:translateY(40px) scale(1.2);}
}

/* Hero */
.hero{
  text-align:center;
  z-index:2;
}

.title{
  font-size:4.5rem;
  font-weight:800;
  background:linear-gradient(90deg,#fff,#ff0,#ff0080,#00ffff,#fff);
  background-size:400%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shimmer 6s linear infinite;
  text-shadow:0 0 40px rgba(255,255,255,0.9);
}

@keyframes shimmer{
  0%{background-position:0%}
  100%{background-position:400%}
}

.subtitle{
  margin-top:20px;
  font-size:1.5rem;
  letter-spacing:2px;
  animation:fadeIn 3s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

button{
  margin-top:40px;
  padding:15px 45px;
  border:none;
  border-radius:50px;
  font-size:1rem;
  cursor:pointer;
  background:linear-gradient(90deg,#ff0080,#00ffff);
  color:white;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 40px rgba(255,255,255,0.8);
}

</style>
</head>
<body>

<!-- Glow Layers -->
<div class="glow glow1"></div>
<div class="glow glow2"></div>
<div class="glow glow3"></div>

<canvas id="fireworks"></canvas>

<div class="hero">
  <div class="title">Happy Holi 🎨 AMRIT OM</div>
  <div class="subtitle">Celebrate the Festival of Colors</div>
  <button onclick="celebrate()">Celebrate 🎆</button>
</div>

<audio id="sound">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-happy-party-boost-493.wav" type="audio/wav">
</audio>

<script>

/* ================= CANVAS FIREWORKS ================= */

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let particles = [];

class Particle{
  constructor(x,y,color,velocity){
    this.x=x;
    this.y=y;
    this.color=color;
    this.velocity=velocity;
    this.alpha=1;
    this.radius=2+Math.random()*2;
  }

  draw(){
    ctx.save();
    ctx.globalAlpha=this.alpha;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fillStyle=this.color;
    ctx.fill();
    ctx.restore();
  }

  update(){
    this.velocity.y+=0.05;
    this.x+=this.velocity.x;
    this.y+=this.velocity.y;
    this.alpha-=0.01;
    this.draw();
  }
}

function createExplosion(x,y){
  const colors=["#ff0080","#00ffff","#ffff00","#ff0000","#00ff88","#ffffff"];
  for(let i=0;i<80;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*6;
    particles.push(new Particle(
      x,y,
      colors[Math.floor(Math.random()*colors.length)],
      {x:Math.cos(angle)*speed,y:Math.sin(angle)*speed}
    ));
  }
}

function animate(){
  requestAnimationFrame(animate);
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles=particles.filter(p=>p.alpha>0);
  particles.forEach(p=>p.update());
}

animate();

/* Auto Fireworks */
setInterval(()=>{
  createExplosion(Math.random()*canvas.width,
                  Math.random()*canvas.height/2);
},1500);

/* Button */
function celebrate(){
  document.getElementById("sound").play();
  createExplosion(canvas.width/2,canvas.height/3);
}

</script>

</body>
</html>
